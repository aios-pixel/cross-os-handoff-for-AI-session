name: Contract tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/cn-handoff
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate plugin manifest
        shell: python
        run: |
          import json
          from pathlib import Path

          manifest = json.loads(Path(".codex-plugin/plugin.json").read_text(encoding="utf-8"))
          assert manifest["name"] == "cn-handoff"
          assert manifest["skills"] == "./skills/"
      - name: Run collector contract tests
        run: python -m unittest discover -s tests -v
